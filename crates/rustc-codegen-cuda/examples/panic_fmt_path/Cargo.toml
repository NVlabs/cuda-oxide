[package]
name = "panic_fmt_path"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[workspace]

# Regression test for the `RigidTy(FnPtr(... std::fmt::Formatter ...))`
# limitation in mir-importer's type translator.
#
# Triggered by any kernel-reachable path that goes through
# `core::panicking::panic_fmt(format_args!(...))`:
#   - `assert!(cond, "msg")`
#   - `panic!("msg")`
#   - `unreachable!("msg")`
#   - `Option::expect("msg")` / `Result::expect("msg")`
#   - `Option::unwrap()` / `Result::unwrap()` (lower through `panic_fmt`)
#
# Build with:
#   cargo oxide run panic_fmt_path

[dependencies]
cuda-device = { path = "../../../cuda-device" }
cuda-host = { path = "../../../cuda-host" }
cuda-core = { path = "../../../cuda-core" }
