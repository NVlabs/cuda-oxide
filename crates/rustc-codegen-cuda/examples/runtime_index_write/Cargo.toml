[package]
name = "runtime_index_write"
version = "0.1.0"
edition = "2024"
license = "Apache-2.0"

[workspace]

# Candidate repro for the runtime-array-index write pattern used by
# base58_encode_32's dynamic-limb-growth loop:
#
#     while remaining_carry > 0 && limb_count < MAX {
#         limbs[limb_count] = (remaining_carry % D) as u32;
#         remaining_carry = remaining_carry / D;
#         limb_count += 1;
#     }
#
# Distinct from divrem/widening repros: the load-bearing pattern here
# is *writing* to a stack array at a runtime-determined index, then
# *reading back* at the same (or another runtime) index across loop
# iterations.
#
# Build with:
#   cargo oxide build runtime_index_write
[dependencies]
cuda-device = { path = "../../../cuda-device" }
cuda-host = { path = "../../../cuda-host" }
cuda-core = { path = "../../../cuda-core" }
