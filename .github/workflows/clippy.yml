---
name: clippy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  clippy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install CUDA toolkit
        uses: Jimver/cuda-toolkit@v0.2.35
        id: cuda-toolkit
        with:
          cuda: "13.1.1"
          method: network
          sub-packages: '["nvcc", "cudart-dev", "curand-dev"]'

      - name: Run clippy (workspace crates)
        env:
          CUDA_TOOLKIT_PATH: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
        run: cargo clippy --workspace -- -D warnings

      # `rustc-codegen-cuda` has its own [workspace] because it links
      # against the rustc-private dylibs. The root --workspace clippy
      # doesn't see it.
      - name: Run clippy (rustc-codegen-cuda)
        env:
          CUDA_TOOLKIT_PATH: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
        working-directory: crates/rustc-codegen-cuda
        run: cargo clippy --all-targets -- -D warnings

      # Each example under examples/ is its own standalone workspace
      # (so the codegen backend can be swapped in via RUSTFLAGS). They're
      # invisible to the root --workspace clippy too, so loop here.
      - name: Run clippy (rustc-codegen-cuda examples)
        env:
          CUDA_TOOLKIT_PATH: ${{ steps.cuda-toolkit.outputs.CUDA_PATH }}
        run: |
          set -e
          for ex in crates/rustc-codegen-cuda/examples/*/; do
            if [ ! -f "$ex/Cargo.toml" ]; then continue; fi
            name=$(basename "$ex")
            echo "::group::clippy: $name"
            (cd "$ex" && cargo clippy --all-targets -- -D warnings)
            echo "::endgroup::"
          done
