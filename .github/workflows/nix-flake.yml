---
name: nix-flake

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test-flake:
    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v25

        # Run a basic cargo check to prove the Nix environment provides
        # the correct LLVM and CUDA linker paths to compile the workspace.
      - name: Verify Environment Compilation
        run: nix develop --command cargo check --workspace --all-targets
